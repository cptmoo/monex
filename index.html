<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monex</title>
  <script>
    window.MONEX_VERSION = "20260321a";
  </script>
</head>

<body>
  <div id="app"></div>

  <script>
    (function () {
      const v = window.MONEX_VERSION;

      const loadScript = (src) =>
        new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = `${src}?v=${v}`;
          script.onload = resolve;
          script.onerror = () => reject(new Error(`Failed to load ${src}`));
          document.body.appendChild(script);
        });

      const link = document.createElement("link");
      link.rel = "stylesheet";
      link.href = `style.css?v=${v}`;
      document.head.appendChild(link);

      loadScript("./vendor/vue.global.prod.js")
        .then(() => loadScript("monex-constants.js"))
        .then(() => loadScript("monex-core.js"))
        .then(() => loadScript("monex-template.js"))
        .then(() => loadScript("app.js"))
        .catch((err) => {
          console.error(err);
        });
    })();
  </script>
</body>
</html>
